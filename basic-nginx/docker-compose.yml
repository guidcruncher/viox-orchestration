services:
  # The Reverse Proxy (Nginx)
  nginx:
    image: nginx:alpine
    container_name: viox-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - viox-network

# Network to allow containers to talk to each other by name
networks:
  viox-network:
    driver: bridge
